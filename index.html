<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Road Trip Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/normalize.css/normalize.css">
  <link rel="stylesheet" href="styles.css" />
  <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js" charset="utf-8"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-service.js" charset="utf-8"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js" charset="utf-8"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js" charset="utf-8"></script>
</head>
<body>
  <!-- Loading overlay for async operations -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="spinner"></div>
    <p>Planning your trip...</p>
  </div>

  <!-- Main app container -->
  <main class="app-container">
    <!-- Header with branding -->
    <header class="app-header">
      <h1 class="app-title">✨ Smart Road Trip Planner</h1>
      <p class="app-subtitle">Plan your journey with style</p>
    </header>

    <!-- Left sidebar with input controls -->
    <aside class="sidebar">
      <section class="input-section">
        <h2>Trip Details</h2>
        
        <div class="input-group">
          <label for="startInput" class="input-label">Starting Point</label>
          <input 
            type="text" 
            id="startInput" 
            class="input-field"
            placeholder="e.g., VIT Vellore" 
            autocomplete="off"
          />
        </div>

        <div class="input-group">
          <label for="endInput" class="input-label">Destination</label>
          <input 
            type="text" 
            id="endInput" 
            class="input-field"
            placeholder="e.g., Marina Beach" 
            autocomplete="off"
          />
        </div>

        <button id="openPreferencesBtn" class="btn btn-primary">
          🎯 Select Your Preferences
        </button>
      </section>

      <!-- Route summary card -->
      <section id="routeSummary" class="route-summary hidden">
        <h3>Route Summary</h3>
        <div class="summary-item">
          <span class="summary-label">Total Distance:</span>
          <span id="totalDistance" class="summary-value">--</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Estimated Time:</span>
          <span id="estimatedTime" class="summary-value">--</span>
        </div>
        <div class="summary-item">
          <span class="summary-label">Waypoints:</span>
          <span id="waypointCount" class="summary-value">0</span>
        </div>
        <button id="clearRouteBtn" class="btn btn-secondary btn-small">Clear Route</button>
      </section>

      <!-- Waypoints list -->
      <section id="waypointsList" class="waypoints-section hidden">
        <h3>Stops Along Your Route</h3>
        <ul id="waypointsContainer" class="waypoints-list"></ul>
      </section>
    </aside>

    <!-- Map container - takes up remaining space -->
    <div id="mapContainer" class="map-container"></div>
  </main>

  <!-- Preference Selection Modal -->
  <div id="preferencesModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>What Would You Like to Stop For?</h2>
        <button id="closeModalBtn" class="modal-close">&times;</button>
      </div>

      <div class="modal-body">
        <p class="modal-subtitle">Select all that apply:</p>
        
        <div class="preferences-grid">
          <!-- Food & Dining -->
          <label class="preference-checkbox">
            <input type="checkbox" name="preferences" value="restaurant" />
            <span class="preference-icon">🍽️</span>
            <span class="preference-label">Restaurants & Cafes</span>
          </label>

          <!-- Gas & Fuel -->
          <label class="preference-checkbox">
            <input type="checkbox" name="preferences" value="petrol-station" />
            <span class="preference-icon">⛽</span>
            <span class="preference-label">Gas Stations</span>
          </label>

          <!-- Medical & Health -->
          <label class="preference-checkbox">
            <input type="checkbox" name="preferences" value="hospital" />
            <span class="preference-icon">🏥</span>
            <span class="preference-label">Medical Services</span>
          </label>

          <!-- Banking & ATM -->
          <label class="preference-checkbox">
            <input type="checkbox" name="preferences" value="atm" />
            <span class="preference-icon">🏦</span>
            <span class="preference-label">ATMs & Banks</span>
          </label>

          <!-- Hotels & Lodging -->
          <label class="preference-checkbox">
            <input type="checkbox" name="preferences" value="hotel" />
            <span class="preference-icon">🏨</span>
            <span class="preference-label">Hotels & Lodging</span>
          </label>

          <!-- Shopping -->
          <label class="preference-checkbox">
            <input type="checkbox" name="preferences" value="shopping" />
            <span class="preference-icon">🛍️</span>
            <span class="preference-label">Shopping Malls</span>
          </label>
        </div>
      </div>

      <div class="modal-footer">
        <button id="confirmPreferencesBtn" class="btn btn-primary btn-large">
          Confirm & Plan Route
        </button>
      </div>
    </div>
  </div>

  <!-- Info overlay (top-right on map) -->
  <div id="mapInfoOverlay" class="map-info-overlay hidden">
    <div class="info-item">
      <span class="info-label">Distance:</span>
      <span id="currentDistance">--</span>
    </div>
    <div class="info-item">
      <span class="info-label">Waypoints:</span>
      <span id="waypointsInfo">0</span>
    </div>
  </div>

  <!-- Toast notification area -->
  <div id="toastContainer" class="toast-container"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
